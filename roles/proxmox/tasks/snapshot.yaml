# code: language=ansible
#
# Create an LVM snapshot of the root volume before applying updates.
#
- name: Generate snapshot name with timestamp
  ansible.builtin.set_fact:
    _proxmox_snapshot_name: "{{ proxmox_vars.snapshot.name_prefix }}-{{ ansible_date_time.iso8601_basic_short }}"

- name: Create LVM snapshot of root volume
  ansible.builtin.command:
    cmd: >-
      lvcreate
      --snapshot
      --name {{ _proxmox_snapshot_name }}
      --size {{ proxmox_vars.snapshot.size }}
      {{ proxmox_vars.snapshot.source_lv }}
  register: _proxmox_snapshot_result
  changed_when: _proxmox_snapshot_result.rc == 0

# code: language=ansible
- name: Merge K8S Share Variables
  ansible.builtin.set_fact:
    k8s_share_vars: |
      {{ lookup('community.general.merge_variables',
                '_k8s_share',
                initial_value=k8s_share_defaults,
                pattern_type='suffix',
                override='ignore') }}

- name: Create K8s Local Share Directories
  ansible.builtin.file:
    state: directory
    path: "{{ item }}"
    owner: "{{ k8s_share_vars.inherited.owner }}"
    group: "{{ k8s_share_vars.inherited.group }}"
    mode: "{{ k8s_share_vars.inherited.mode }}"
  loop:
    - "{{ k8s_share_vars.inherited.downloads }}"
    - "{{ k8s_share_vars.inherited.share }}"
  delegate_to: localhost

- name: Fetch All Kubeconfigs
  ansible.builtin.slurp:
    src: "{{ k8s_share_vars.inherited.kubeconfig }}"
  register: k8s_share_fetched_kubeconfigs

- name: Write Kubeconfig Locally
  ansible.builtin.copy:
    content: "{{ k8s_share_fetched_kubeconfigs.content | b64decode }}"
    dest: "{{ k8s_share_vars.inherited.downloads }}/kubeconfig.{{ inventory_hostname }}-loopback.yaml"
    owner: "{{ k8s_share_vars.inherited.owner }}"
    group: "{{ k8s_share_vars.inherited.group }}"
    mode: "{{ k8s_share_vars.inherited.mode }}"
  delegate_to: localhost

- name: Transform and Share Kubeconfig
  kubeconfig_transform:
    src: "{{ k8s_share_vars.inherited.downloads }}/kubeconfig.{{ inventory_hostname }}-loopback.yaml"
    dest: "{{ k8s_share_vars.inherited.share }}/kubeconfig.d/kubeconfig.{{ inventory_hostname }}.yaml"
    server: "{{ ansible_fqdn }}"
    name: "{{ inventory_hostname }}"
    owner: "{{ k8s_share_vars.inherited.owner }}"
    group: "{{ k8s_share_vars.inherited.group }}"
    mode: "{{ k8s_share_vars.inherited.mode }}"
  delegate_to: localhost

- name: Merge All Kubeconfigs
  kubeconfig_merge:
    src_dir: "{{ k8s_share_vars.inherited.share }}/kubeconfig.d"
    dest: "{{ k8s_share_vars.inherited.share }}/kubeconfig.all.yaml"
    owner: "{{ k8s_share_vars.inherited.owner }}"
    group: "{{ k8s_share_vars.inherited.group }}"
    mode: "{{ k8s_share_vars.inherited.mode }}"
  delegate_to: localhost
  run_once: true

- name: Link System kubeconfig (Overrides K3S kubeconfig with shared)
  ansible.builtin.file:
    src: "{{ k8s_share_vars.inherited.share }}/kubeconfig.all.yaml"
    path: "{{ k8s_share_vars.inherited.kubeconfig }}"
    state: link
  delegate_to: localhost

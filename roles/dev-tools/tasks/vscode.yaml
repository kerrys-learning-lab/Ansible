# code: language=ansible
- name: VS Code - Download GPG Key
  ansible.builtin.get_url:
    url: "{{ devtools_vars.vscode.gpg_key_url }}"
    dest: "{{ devtools_vars.vscode.keyring }}.asc"
    mode: a=r

- name: VS Code - Dearmor GPG Key
  ansible.builtin.command:
    cmd: >-
      gpg --dearmor -o {{ devtools_vars.vscode.keyring }}
      {{ devtools_vars.vscode.keyring }}.asc
    creates: "{{ devtools_vars.vscode.keyring }}"

- name: VS Code - Add Apt Repository (DEB822 format)
  ansible.builtin.deb822_repository:
    name: vscode
    uris: https://packages.microsoft.com/repos/code
    suites: stable
    components: main
    architectures: amd64
    signed_by: "{{ devtools_vars.vscode.keyring }}"

- name: VS Code - Remove legacy apt source
  ansible.builtin.file:
    path: "{{ devtools_vars.vscode.source_file_legacy }}"
    state: absent

- name: VS Code - Remove legacy keyring
  ansible.builtin.file:
    path: "{{ devtools_vars.vscode.keyring_legacy }}"
    state: absent

- name: VS Code - Install
  ansible.builtin.package:
    name: "{{ devtools_vars.vscode.packages }}"

- name: Create ArgoCD ApplicationSets for Matrix (Cluster + Git Repo)
  kubernetes.core.k8s:
    state: present
    apply: true
    definition: "{{ lookup('ansible.builtin.template', 'applicationset.j2.yaml') | from_yaml }}"
    kubeconfig: "{{ argocd_vars.inherited.kubeconfig }}"
  vars:
    appset_type: matrix-repo
    appset_key: "{{ item.key }}"
    appset_name: "{{ item.key }}-applicationset-matrix-repo"
    appset: "{{ item.value }}"
  loop: "{{ argocd_vars.applicationsets_matrix | default({}) | dict2items }}"
  loop_control:
    label: "{{ item.key }}"


- name: Register ArgoCD Cluster Secrets
  kubernetes.core.k8s:
    state: present
    apply: true
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "cluster-{{ item }}"
        namespace: "{{ argocd_vars.namespace }}"
        labels: "{{ {'argocd.argoproj.io/secret-type': 'cluster'} | combine(hostvars[item].argocd_agent_labels) }}"
      type: Opaque
      stringData:
        name: "{{ item }}"
        server: "{{ hostvars[item].argocd_agent_server }}"
        config: |
          {
            "bearerToken": "{{ hostvars[item].argocd_agent_token }}",
            "tlsClientConfig": {
              "caData": "{{ hostvars[item].argocd_agent_ca }}",
              "insecure": false
            }
          }
    kubeconfig: "{{ argocd_vars.inherited.kubeconfig }}"
  loop: "{{ groups['argocd_cluster'] | default([]) | select('in', ansible_play_hosts) }}"
  loop_control:
    label: "{{ item }}"

- name: Create ArgoCD ApplicationSets for Matrix (Cluster + Helm Chart)
  kubernetes.core.k8s:
    state: present
    apply: true
    definition: "{{ lookup('ansible.builtin.template', 'applicationset.j2.yaml') | from_yaml }}"
    kubeconfig: "{{ argocd_vars.inherited.kubeconfig }}"
  vars:
    appset_type: matrix-chart
    appset_key: "{{ item.key }}"
    appset_name: "{{ item.key }}-applicationset-matrix-chart"
    appset: "{{ item.value }}"
  loop: "{{ argocd_vars.applicationsets_matrix | default({}) | dict2items }}"

# code: language=ansible
- name: Create ArgoCD TLS Certificate
  kubernetes.core.k8s:
    state: present
    apply: true
    definition:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: argocd-server
        namespace: "{{ argocd_vars.namespace }}"
      spec:
        secretName: argocd-server-tls
        dnsNames: "{{ argocd_vars.certificate.dnsNames }}"
        issuerRef:
          name: "{{ argocd_vars.certificate.clusterIssuer }}"
          kind: ClusterIssuer
    kubeconfig: "{{ argocd_vars.inherited.kubeconfig }}"
  when: argocd_vars.certificate is defined
  tags:
    - argocd


- name: Install/Configure ArgoCD via Helm
  kubernetes.core.helm:
    name: "{{ argocd_vars.name }}"
    namespace: "{{ argocd_vars.namespace }}"
    chart_repo_url: "{{ argocd_vars.chart.url }}"
    chart_version: "{{ argocd_vars.chart.version }}"
    chart_ref: "{{ argocd_vars.chart.ref }}"
    release_values: "{{ argocd_vars.helm_values }}"
    create_namespace: true
    wait: true
    kubeconfig: "{{ argocd_vars.inherited.kubeconfig }}"
  tags:
    - argocd


- name: Retrieve ArgoCD Admin Secret
  kubernetes.core.k8s:
    version: v1
    kind: Secret
    name: argocd-initial-admin-secret
    namespace: "{{ argocd_vars.namespace }}"
    kubeconfig: "{{ argocd_vars.inherited.kubeconfig }}"
  register: argocd_admin_secret
  tags:
    - argocd


- name: Register ArgoCD Cluster Secrets
  kubernetes.core.k8s:
    state: present
    force: true
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "cluster-{{ item }}"
        namespace: "{{ argocd_vars.namespace }}"
        labels: "{{ {'argocd.argoproj.io/secret-type': 'cluster'} | combine(hostvars[item].argocd_agent_labels) }}"
      type: Opaque
      stringData:
        name: "{{ item }}"
        server: "{{ hostvars[item].argocd_agent_server }}"
        config: >-
          {{ {"bearerToken": hostvars[item].argocd_agent_token,
              "tlsClientConfig": {"caData": hostvars[item].argocd_agent_ca,
                                  "insecure": false}} | to_json }}
    kubeconfig: "{{ argocd_vars.inherited.kubeconfig }}"
  loop: "{{ groups['argocd_cluster'] | default([]) | select('in', ansible_play_hosts) }}"
  loop_control:
    label: "{{ item }}"
  tags:
    - argocd

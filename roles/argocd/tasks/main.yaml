- name: Install/Configure ArgoCD via Helm
  kubernetes.core.helm:
    name: argo-cd
    namespace: argo
    chart_repo_url: "{{ argocd.helm.repo.url }}"
    chart_version: "{{ argocd.helm.repo.version }}"
    chart_ref: "{{ argocd.helm.ref }}"
    release_values: "{{ argocd.helm.helm_values | ansible.builtin.combine(host.argocd.helm_values, recursive=true) }}"
    create_namespace: true
    kubeconfig: /etc/kubeconfig

- name: Ensure ArgoCD downloadpath
  ansible.builtin.file:
    name: "{{ paths.download }}/argocd-{{ argocd.cli.version }}"
    state: directory

- name: Download ArgoCD CLI
  ansible.builtin.get_url:
    url: https://github.com/argoproj/argo-cd/releases/download/{{ argocd.cli.version }}/argocd-linux-amd64
    dest: "{{ paths.download }}/argocd-{{ argocd.cli.version}}/argocd-linux-amd64"
    mode: 0555

- name: Link ArgoCD CLI
  ansible.builtin.file:
    src: "{{ paths.download }}/argocd-{{ argocd.cli.version}}/argocd-linux-amd64"
    dest: /usr/local/bin/argocd
    state: link

- name: Login to ArgoCD CLI
  ansible.builtin.command:
    /usr/local/bin/argocd login --username {{ argocd.cli.server.username }}
                                --password {{ argocd.cli.server.password }}
                                {{ argocd.hostname | default('argocd.westsidestreet.net') }}

- name: Create ArgoCD Projects
  kubernetes.core.k8s:
    state: present
    apply: true
    definition:
      apiVersion: argoproj.io/v1alpha1
      kind: AppProject
      metadata:
        name: "{{ item.key }}"
        namespace: argo
        finalizers:
          - resources-finalizer.argocd.argoproj.io
      spec:
        description: "{{ item.value.description | default('TBP') }}"
        sourceRepos:
          - '*'
        destinations:
          - namespace: "{{ item.value.destination.namespace | default(item.key) }}"
            name: "{{ item.value.destination.name | default('in-cluster') }}"
        clusterResourceWhitelist:
          - group: '*'
            kind: Namespace
          - group: '*'
            kind: ClusterRole
          - group: '*'
            kind: ClusterRoleBinding
          - group: '*'
            kind: Role
          - group: '*'
            kind: RoleBinding
          - group: '*'
            kind: CustomResourceDefinition
    kubeconfig: /etc/kubeconfig
  loop: "{{ argocd.projects | default({}) | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: Create ArgoCD ApplicationSets for Helm Charts
  kubernetes.core.k8s:
    state: present
    apply: true
    definition:
      apiVersion: argoproj.io/v1alpha1
      kind: ApplicationSet
      metadata:
        name: "{{ item.key }}-applicationset-helm-chart"
        namespace: argo
      spec:
        goTemplate: true
        goTemplateOptions:
          - missingkey=error
        generators:
          - git:
              repoURL: "{{ item.value.source.url }}"
              revision: "{{ item.value.source.ref }}"
              files:
                - path: argocd-app-of-apps/*/chart.yaml
        template:
          metadata:
            name: "{{ item.key }}-{{ '{{' }} index .path.segments 1 {{ '}}' }}"
          spec:
            project: "{{ item.key }}"
            sources:
              - repoURL: "{{ '{{' }} .source.repoURL {{ '}}' }}"
                targetRevision: "{{ '{{' }} .source.targetRevision {{ '}}' }}"
                chart: "{{ '{{' }} .source.chart {{ '}}' }}"
                helm:
                  valueFiles:
                    - $values/argocd-app-of-apps/{{ '{{' }} index .path.segments 1 {{ '}}' }}/{{ item.value.destination.name }}-values.yaml
              - repoURL: "{{ item.value.source.url }}"
                targetRevision: "{{ item.value.source.ref }}"
                ref: values
            destination:
              name: "{{ item.value.destination.name }}"
              namespace: "{{ item.value.destination.namespace | default(item.key) }}"
            syncPolicy:
              automated:
                prune: "{{ item.value.automatedSync.prune | default(True) }}"
                selfHeal: "{{ item.value.automatedSync.selfHeal | default(True) }}"
              syncOptions:
                - CreateNamespace=true
    kubeconfig: /etc/kubeconfig
  loop: "{{ argocd.applicationsets | default({}) | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: Create ArgoCD ApplicationSets for Git Repos
  kubernetes.core.k8s:
    state: present
    apply: true
    definition:
      apiVersion: argoproj.io/v1alpha1
      kind: ApplicationSet
      metadata:
        name: "{{ item.key }}-applicationset-git-repo"
        namespace: argo
      spec:
        goTemplate: true
        goTemplateOptions:
          - missingkey=error
        generators:
          - git:
              repoURL: "{{ item.value.source.url }}"
              revision: "{{ item.value.source.ref }}"
              files:
                - path: argocd-app-of-apps/*/repo.yaml
        template:
          metadata:
            name: "{{ item.key }}-{{ '{{' }} index .path.segments 1 {{ '}}' }}"
          spec:
            project: "{{ item.key }}"
            sources:
              - repoURL: "{{ '{{' }} .source.repoURL {{ '}}' }}"
                targetRevision: "{{ '{{' }} .source.targetRevision {{ '}}' }}"
                path: "{{ '{{' }} .source.path {{ '}}' }}"
                helm:
                  valueFiles:
                    - $values/argocd-app-of-apps/{{ '{{' }} index .path.segments 1 {{ '}}' }}/{{ item.value.destination.name }}-values.yaml
              - repoURL: "{{ item.value.source.url }}"
                targetRevision: "{{ item.value.source.ref }}"
                ref: values
            destination:
              name: "{{ item.value.destination.name }}"
              namespace: "{{ item.value.destination.namespace | default(item.key) }}"
            syncPolicy:
              automated:
                prune: "{{ item.value.automatedSync.prune | default(True) }}"
                selfHeal: "{{ item.value.automatedSync.selfHeal | default(True) }}"
              syncOptions:
                - CreateNamespace=true
    kubeconfig: /etc/kubeconfig
  loop: "{{ argocd.applicationsets | default({}) | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

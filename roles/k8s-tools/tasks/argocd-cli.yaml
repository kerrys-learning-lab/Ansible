# code: language=ansible
- name: Set ArgoCD CLI Derived Facts
  ansible.builtin.set_fact:
    k8s_tools_argocd_filename: "argocd-{{ ansible_system | lower }}-{{ ansible_local['arch']['dpkg'] }}"
    k8s_tools_argocd_version_path: "{{ k8s_tools_vars.global.install }}/argocd/{{ k8s_tools_vars.argocd.version }}"
    k8s_tools_argocd_url: "{{ k8s_tools_vars.argocd.url_prefix }}/{{ k8s_tools_vars.argocd.version }}/argocd-{{ ansible_system | lower }}-{{ ansible_local['arch']['dpkg'] }}"

- name: Ensure ArgoCD CLI install directory
  ansible.builtin.file:
    path: "{{ k8s_tools_argocd_version_path }}"
    state: directory
    owner: "{{ k8s_tools_vars.global.owner }}"
    group: "{{ k8s_tools_vars.global.group }}"
    mode: "{{ k8s_tools_vars.global.mode }}"

- name: Download ArgoCD CLI
  ansible.builtin.get_url:
    url: "{{ k8s_tools_argocd_url }}"
    dest: "{{ k8s_tools_argocd_version_path }}/{{ k8s_tools_argocd_filename }}"
    mode: "0755"

- name: Link ArgoCD CLI binary
  ansible.builtin.file:
    src: "{{ k8s_tools_argocd_version_path }}/{{ k8s_tools_argocd_filename }}"
    dest: "{{ k8s_tools_vars.argocd.bin }}"
    state: link

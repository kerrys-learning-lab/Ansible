# code: language=ansible
- name: GPU - Install Node Feature Discovery Using Helm OCI
  kubernetes.core.helm:
    name: "{{ k8s_applications_vars.gpu.node_feature_discovery.helm.name }}"
    namespace: "{{ k8s_applications_vars.gpu.node_feature_discovery.namespace }}"
    chart_version: "{{ k8s_applications_vars.gpu.node_feature_discovery.helm.chart.version }}"
    chart_ref: "{{ k8s_applications_vars.gpu.node_feature_discovery.helm.chart.oci }}"
    release_values: "{{ k8s_applications_vars.gpu.node_feature_discovery.helm_values }}"
    create_namespace: true
    kubeconfig: "{{ k8s_applications_vars.inherited.kubeconfig }}"
    wait: true

- name: GPU - Create NodeFeatureRule for NVIDIA GPU detection
  kubernetes.core.k8s:
    state: present
    apply: true
    definition:
      apiVersion: nfd.k8s-sigs.io/v1alpha1
      kind: NodeFeatureRule
      metadata:
        name: nvidia-gpu
        namespace: "{{ k8s_applications_vars.gpu.node_feature_discovery.namespace }}"
      spec:
        rules:
          - name: "NVIDIA GPU detection"
            labels:
              nvidia.com/gpu.present: "true"
            matchFeatures:
              - feature: pci.device
                matchExpressions:
                  vendor:
                    op: In
                    value: ["10de"]
    kubeconfig: "{{ k8s_applications_vars.inherited.kubeconfig }}"

- name: GPU - Install NVIDIA Device Plugin Using Helm
  kubernetes.core.helm:
    name: "{{ k8s_applications_vars.gpu.nvidia_device_plugin.helm.name }}"
    namespace: "{{ k8s_applications_vars.gpu.nvidia_device_plugin.namespace }}"
    chart_repo_url: "{{ k8s_applications_vars.gpu.nvidia_device_plugin.helm.chart.url }}"
    chart_version: "{{ k8s_applications_vars.gpu.nvidia_device_plugin.helm.chart.version }}"
    chart_ref: "{{ k8s_applications_vars.gpu.nvidia_device_plugin.helm.chart.ref }}"
    release_values: "{{ k8s_applications_vars.gpu.nvidia_device_plugin.helm_values }}"
    create_namespace: true
    kubeconfig: "{{ k8s_applications_vars.inherited.kubeconfig }}"
    wait: true

# code: language=ansible
- name: Elasticsearch Operator - Download Manifests
  ansible.builtin.uri:
    url: "{{ k8s_applications_vars.elastic_operator.url.prefix }}/{{ k8s_applications_vars.elastic_operator.version }}/{{ item }}"
    return_content: true
  loop: "{{ k8s_applications_vars.elastic_operator.url.resources }}"
  register: elastic_operator_manifests

- name: Elasticsearch Operator - Install Resources
  kubernetes.core.k8s:
    state: present
    apply: true
    definition: "{{ item.content | from_yaml_all | list }}"
    kubeconfig: "{{ k8s_applications_vars.inherited.kubeconfig }}"
  loop: "{{ elastic_operator_manifests.results }}"
  loop_control:
    label: "{{ item.item }}"

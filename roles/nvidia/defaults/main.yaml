# code: language=ansible
#
# NVIDIA GPU Driver and Container Toolkit defaults.
# Values can be changed globally by updating group_vars/all/global.yaml
# or overridden per-group/host via the Variable Merge Pattern.
#
nvidia_defaults:

  # --------------------------------------------------------------------------
  # NVIDIA GPU Driver
  #
  # Debian/Ubuntu:
  #   Uses `ubuntu-drivers autoinstall` to detect and install the appropriate
  #   driver for the GPU.  Requires `ubuntu-drivers-common` package.
  #   Reference: https://ubuntu.com/server/docs/nvidia-drivers-installation
  #
  # RedHat/Fedora:
  #   Uses RPM Fusion nonfree repo. The akmod-nvidia package automatically
  #   builds kernel modules when the kernel is updated.
  #   Reference: https://rpmfusion.org/Howto/NVIDIA
  driver:
    debian:
      packages:
        - ubuntu-drivers-common
    redhat:
      repos:
        - "https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ ansible_distribution_major_version }}.noarch.rpm"
        - "https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_distribution_major_version }}.noarch.rpm"
      packages:
        - akmod-nvidia
        - xorg-x11-drv-nvidia-cuda


  # --------------------------------------------------------------------------
  # NVIDIA Container Toolkit
  # Reference: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/latest/install-guide.html
  container_toolkit:
    debian:
      gpg_key_url: https://nvidia.github.io/libnvidia-container/gpgkey
      keyring: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
      repo: "deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://nvidia.github.io/libnvidia-container/stable/deb/{{ ansible_local['arch']['dpkg'] }} /"
    redhat:
      repo:
        name: nvidia-container-toolkit
        url: "https://nvidia.github.io/libnvidia-container/stable/rpm/nvidia-container-toolkit.repo"
    packages:
      - nvidia-container-toolkit
    service: containerd


  # --------------------------------------------------------------------------
  # NVIDIA Container Toolkit Configuration (nvidia-ctk)
  #
  # Supported runtimes:
  #   containerd - Configures containerd for GPU access (K3s/Kubernetes)
  #                Runs: nvidia-ctk runtime configure --runtime=containerd
  #   cdi        - Enables CDI spec generation for Podman GPU access
  #                Enables: nvidia-cdi-refresh.service
  #
  # Reference: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/latest/install-guide.html
  ctk:
    runtimes: []


  # --------------------------------------------------------------------------
  inherited:
    owner: "{{ lookup('ansible.builtin.vars', 'global').owner | default('root') }}"
    group: "{{ lookup('ansible.builtin.vars', 'global').group | default('root') }}"
    mode: "{{ lookup('ansible.builtin.vars', 'global').mode | default('a=rX') }}"
    downloads: "{{ lookup('ansible.builtin.vars', 'global').working | default('/var/lib/ansible') }}/downloads"
    working: "{{ lookup('ansible.builtin.vars', 'global').working | default('/var/lib/ansible') }}/{{ role_name }}"

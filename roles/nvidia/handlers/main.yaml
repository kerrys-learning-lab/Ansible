# code: language=ansible
- name: Reboot for NVIDIA driver
  ansible.builtin.reboot:

- name: Restart Kubernetes Runtime
  ansible.builtin.systemd:
    name: "{{ k8s_engine.service | default(nvidia_vars.container_toolkit.service) }}"
    state: restarted
  when:
    - "'k3s.service' in ansible_facts.services"
    - "ansible_facts.services['k3s.service'].state == 'running'"

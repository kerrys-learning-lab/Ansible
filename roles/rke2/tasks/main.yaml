- name: Create Rancher/RKE2 Configuration Directory
  ansible.builtin.file:
    path: /etc/rancher/rke2
    state: directory
    force: true
    mode: '0755'

- name: Configure Rancher/RKE2
  ansible.builtin.template:
    src: rke2-config.j2.yaml
    dest: /etc/rancher/rke2/config.yaml
  notify:
    - Restart RKE2

- name: Start Rancher/RKE2 Service
  ansible.builtin.service:
    name: rke2-server
    enabled: true
    state: started

- name: Flush Handlers After Updating RKE2
  ansible.builtin.meta: flush_handlers

- name: Link RKE2 kubeconfig
  ansible.builtin.file:
    src: "{{ rke2.kubeconfig.src }}"
    path: "{{ rke2.kubeconfig.dest }}"
    state: link
    force: true

- name: Link kubectl
  ansible.builtin.file:
    src: "{{ rke2.kubectl.src }}"
    path: "{{ rke2.kubectl.dest }}"
    state: link
    force: true

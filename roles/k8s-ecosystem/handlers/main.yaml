# code: language=ansible
- name: Restart RKE2
  ansible.builtin.service:
    name: rke2-server
    state: restarted

- name: Perform a Rolling Restart of CoreDNS pods
  ansible.builtin.command:
    cmd: >
      kubectl --kubeconfig  {{ k8s_ecosystem_vars.inherited.kubeconfig }}
              --namespace   kube-system
              rollout
              restart
              deployment/coredns
  changed_when: true

- name: Merge k8s Variables
  ansible.builtin.set_fact:
    k8s_vars: |
      {{ lookup('community.general.merge_variables',
                '_k8s',
                initial_value=k8s_defaults,
                pattern_type='suffix') }}

- name: Set k8s Environment
  ansible.builtin.copy:
    dest: "{{ k8s_vars.global.paths.env }}"
    content: |
      export KUBECONFIG={{ k8s_vars.global.paths.kubeconfig }}
    mode: "{{ k8s_vars.global.mode }}"

- name: Configure k8s Namespaces
  ansible.builtin.include_tasks: namespaces.yaml
  tags:
    - namespace
    - ns

- name: Configure k8s Storage
  ansible.builtin.include_tasks: storage.yaml
  tags:
    - pv
    - storage

- name: Configure k8s Secrets
  ansible.builtin.include_tasks: secrets.yaml
  tags:
    - pv
    - secret

- name: Configure k8s Certificate Manager and Certificates
  ansible.builtin.include_tasks: certificates.yaml
  tags:
    - cert

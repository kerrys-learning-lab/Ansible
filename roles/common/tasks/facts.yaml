# code: language=ansible
- name: Create Custom Facts Directory
  ansible.builtin.file:
    name: "{{ common_vars.inherited.facts }}"
    state: directory
    mode: "{{ common_vars.inherited.mode }}"

- name: Create Architecture Mapping Facts Script
  ansible.builtin.copy:
    src: files/arch.fact
    dest: "{{ common_vars.inherited.facts }}/arch.fact"
    mode: "0555"

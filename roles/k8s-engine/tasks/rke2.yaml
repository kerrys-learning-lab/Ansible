# code: language=ansible
- name: RKE2 - Ensure Download Path
  ansible.builtin.file:
    name: "{{ k8s_engine_vars.global.downloads }}"
    state: directory
    mode: a=rX

- name: RKE2 - Download RKE2 Installer
  ansible.builtin.get_url:
    url: "{{ k8s_engine_vars.rke2.installer.url }}"
    dest: "{{ k8s_engine_vars.global.downloads }}/installer.sh"
    mode: a=rx

- name: RKE2 - Run RKE2 Installer
  ansible.builtin.command: "{{ k8s_engine_vars.global.downloads }}/installer.sh"
  args:
    creates: "{{ k8s_engine_vars.rke2.installer.creates }}"

- name: RKE2 - Create Rancher/RKE2 Configuration Directory
  ansible.builtin.file:
    path: "{{ k8s_engine_vars.rke2.kubeconfig.src | dirname }}"
    state: directory
    force: true
    mode: ug=rwx,o=rx

- name: RKE2 - Configure Rancher/RKE2
  ansible.builtin.template:
    src: rke2/config.j2.yaml
    dest: /etc/rancher/rke2/config.yaml
    mode: ug=rwx,o=rx
  notify:
    - Restart RKE2

- name: RKE2 - Configure Rancher/RKE2 Registries
  ansible.builtin.template:
    src: rke2/registries.j2.yaml
    dest: /etc/rancher/rke2/registries.yaml
    mode: a=r
  vars:
    registries: "{{ k8s_engine_vars.rke2.registries }}"
  when: "'registries' in k8s_engine_vars.rke2"
  notify:
    - Restart RKE2

- name: RKE2 - Start Rancher/RKE2 Service
  ansible.builtin.service:
    name: rke2-server
    enabled: true
    state: started

- name: RKE2 - Flush Handlers After Updating RKE2
  ansible.builtin.meta: flush_handlers

- name: RKE2 - Link RKE2 kubeconfig
  ansible.builtin.file:
    src: "{{ k8s_engine_vars.rke2.kubeconfig.src }}"
    path: "{{ k8s_engine_vars.rke2.kubeconfig.dest }}"
    state: link

- name: RKE2 - Link kubectl
  ansible.builtin.file:
    src: "{{ k8s_engine_vars.rke2.kubectl.src }}"
    path: "{{ k8s_engine_vars.rke2.kubectl.dest }}"
    state: link
    force: true

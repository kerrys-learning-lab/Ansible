# code: language=ansible
- name: CRC - Fail if Multiple Users Configured
  ansible.builtin.fail:
    msg: |
      {{ k8s_engine_vars.inherited.error }}: Multiple users ({{ k8s_engine_vars.crc.users | dict2items | length }}) configured for CRC.
      CodeReady Containers is designed for single-user development environments.
      Running CRC with multiple users may cause conflicts and unexpected behavior.
  when:
    - (k8s_engine_vars.crc.users | dict2items | length) > 1

- name: CRC - Identify CodeReady User
  ansible.builtin.set_fact:
    crc_user: "{{ k8s_engine_vars.crc.users | dict2items | first }}"

- name: CRC - Install CodeReady Containers Prerequisite Packages
  ansible.builtin.package:
    name: "{{ k8s_engine_vars.crc.packages | default([]) }}"
    state: present

- name: CRC - Ensure CodeReady Containers Paths
  ansible.builtin.file:
    name: "{{ item }}"
    state: directory
    mode: a=rX
  loop:
    - "{{ k8s_engine_vars.inherited.downloads }}"
    - "{{ k8s_engine_vars.inherited.install }}"
    - "{{ k8s_engine_vars.inherited.secrets }}"
    - "{{ k8s_engine_vars.inherited.working }}"

- name: CRC - Download CodeReady Containers CLI
  ansible.builtin.get_url:
    url: "{{ k8s_engine_vars.crc.remote.url_prefix }}/{{ k8s_engine_vars.crc.remote.version }}/{{ k8s_engine_vars.crc.remote.filename }}"
    dest: "{{ k8s_engine_vars.inherited.downloads }}/{{ k8s_engine_vars.crc.remote.filename }}"
    mode: a=rx

- name: CRC - Extract CodeReady Containers CLI
  ansible.builtin.unarchive:
    src: "{{ k8s_engine_vars.inherited.downloads }}/{{ k8s_engine_vars.crc.remote.filename }}"
    dest: "{{ k8s_engine_vars.inherited.install }}"
    remote_src: true
    mode: a=rX

- name: CRC - Link CodeReady Containers CLI
  ansible.builtin.file:
    src: "{{ k8s_engine_vars.inherited.install }}/crc-linux-{{ k8s_engine_vars.crc.remote.version }}-amd64/crc"
    path: "{{ k8s_engine_vars.crc.bin }}"
    state: link

- name: CRC - Create CodeReady Containers Pull Secret File(s)
  ansible.builtin.copy:
    content: "{{ crc_user.value.pull_secret }}"
    dest: "{{ k8s_engine_vars.inherited.secrets }}/{{ crc_user.key }}--pull-secret.json"
    owner: "{{ crc_user.key }}"
    group: "{{ crc_user.value.group | default(crc_user.key) }}"
    mode: u=r,g=,o=

- name: CRC - Merge the User's Configuration
  ansible.builtin.set_fact:
    crc_user_config: |
      {{ (crc_user.value.config | default({})) |
          combine({
            'pull-secret-file': k8s_engine_vars.inherited.secrets + '/' + crc_user.key + '--pull-secret.json',
            'consent-telemetry': 'no'
          })
      }}

- name: CRC - Configure CodeReady Containers for Users (this may take a few minutes!) ⌛ ⌛ ⌛
  crc:
    user: "{{ crc_user.key }}"
    crc_path: "{{ k8s_engine_vars.crc.bin }}"
    config: "{{ crc_user_config }}"
    setup: true
    start: true
    kubeconfig:
      link: "{{ k8s_engine_vars.inherited.kubeconfig }}"
      mode: "{{ k8s_engine_vars.inherited.mode }}"
  async: 900
  poll: 60

- name: CRC - Create OpenShift Local Operator Namespaces
  kubernetes.core.k8s:
    state: present
    apply: true
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ item.value.namespace }}"
    kubeconfig: "{{ k8s_engine_vars.inherited.kubeconfig }}"
  loop: "{{ k8s_engine_vars.crc.operator_groups | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: CRC - Create OpenShift Local Operator Groups YAMLs
  ansible.builtin.template:
    dest: "{{ k8s_engine_vars.inherited.working }}/{{ item.key }}--operator-group.yaml"
    src: crc/operator-group.j2.yaml
    mode: "{{ k8s_engine_vars.inherited.mode }}"
  loop: "{{ k8s_engine_vars.crc.operator_groups | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: CRC - Create OpenShift Local Operator Groups
  kubernetes.core.k8s:
    state: present
    apply: true
    src: "{{ k8s_engine_vars.inherited.working }}/{{ item.key }}--operator-group.yaml"
    kubeconfig: "{{ k8s_engine_vars.inherited.kubeconfig }}"
  loop: "{{ k8s_engine_vars.crc.operator_groups | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: CRC - Create OpenShift Local Operator Subscriptions
  kubernetes.core.k8s:
    state: present
    apply: true
    definition:
      apiVersion: operators.coreos.com/v1alpha1
      kind: Subscription
      metadata:
        name: "{{ item.key }}"
        namespace: "{{ item.value.namespace | default(k8s_engine_vars.crc.operator_groups[item.value.group].namespace) }}"
      spec:
        channel: "{{ item.value.channel | default('stable') }}"
        name: "{{ item.key }}"
        source: "{{ item.value.source | default('redhat-operators') }}"
        sourceNamespace: "{{ item.value.source_namespace | default('openshift-marketplace') }}"
    kubeconfig: "{{ k8s_engine_vars.inherited.kubeconfig }}"
  loop: "{{ k8s_engine_vars.crc.operators | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

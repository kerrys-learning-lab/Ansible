- name: Install/Configure GitLab Operator via Helm
  kubernetes.core.helm:
    name: "{{ gitlab.operator.name }}"
    namespace: "{{ gitlab.operator.namespace }}"
    chart_repo_url: "{{ gitlab.operator.url }}"
    chart_version: "{{ gitlab.operator.version }}"
    chart_ref: "{{ gitlab.operator.ref }}"
    release_values: "{{ gitlab.operator.helm_values }}"
    create_namespace: true
    kubeconfig: /etc/kubeconfig
  notify:
    - Wait for GitLab Operator to be Installed

- name: Wait for GitLab Operator to be Installed (flush handlers)
  ansible.builtin.meta: flush_handlers

- name: Create Local Kubernetes Volume Directories
  ansible.builtin.file:
    path: "{{ item.key }}"
    state: directory
    owner: "{{ item.value.owner | default('root') }}"
    group: "{{ item.value.group | default('root') }}"
    mode: "{{ item.value.mode }}"
  loop: "{{ gitlab.directories | default({}) | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: Create GitLab Backup Secret
  kubernetes.core.k8s:
    state: present
    apply: true
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: external-backup-s3cfg
        namespace: gitlab-system
      stringData:
        config: |
          host_base = {{ gitlab.backups.minio.base }}
          host_bucket = {{ gitlab.backups.minio.bucket }}
          bucket_location = {{ gitlab.backups.minio.location }}
          use_https = {{ gitlab.backups.minio.https }}
          access_key = {{ gitlab.backups.minio.access }}
          secret_key = {{ gitlab_secrets.backups.minio.key }}
          signature_v2 = False
    kubeconfig: /etc/kubeconfig



- name: Create Local Kubernetes Volume(s) for GitLab
  kubernetes.core.k8s:
    state: present
    apply: true
    definition:
      apiVersion: v1
      kind: PersistentVolume
      metadata:
        name: "{{ item.key }}"
        labels:
          owner: "{{ item.key }}"
      spec:
        capacity:
          storage: "{{ item.value.capacity | default('10Gi') }}"
        accessModes:
          - "{{ item.value.accessMode | default('ReadWriteOnce') }}"
        persistentVolumeReclaimPolicy: "{{ item.value.reclaimPolicy | default('Retain') }}"
        storageClassName: local
        hostPath:
          path: "{{ item.value.path }}"
    kubeconfig: /etc/kubeconfig
  loop: "{{ gitlab.k8s.volumes.local | default({}) |dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: Create Local Kubernetes Claim(s) for GitLab
  kubernetes.core.k8s:
    state: present
    apply: true
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: "{{ item.key }}"
        namespace: "{{ item.value.namespace | default('gitlab-system') }}"
      spec:
        resources:
          requests:
            storage: "{{ item.value.capacity | default('10Gi') }}"
        accessModes:
          - "{{ item.value.accessMode | default('ReadWriteOnce') }}"
        volumeName: "{{ item.value.volume }}"
        storageClassName: local
    kubeconfig: /etc/kubeconfig
  loop: "{{ gitlab.k8s.claims.local | default({}) |dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: Apply GitLab CRD
  kubernetes.core.k8s:
    state: present
    apply: true
    definition:
      apiVersion: apps.gitlab.com/v1beta1
      kind: GitLab
      metadata:
        name: gitlab
        namespace: gitlab-system
      spec:
        chart:
          version: "{{ gitlab.application.version }}"
          values: "{{ gitlab.application.crd_values }}"
    kubeconfig: /etc/kubeconfig


# code: language=ansible
- name: Merge vLLM Variables
  ansible.builtin.set_fact:
    vllm_vars: |
      {{ lookup('community.general.merge_variables',
                '_vllm',
                initial_value=vllm_defaults,
                pattern_type='suffix',
                override='ignore') }}

- name: Set vLLM Derived Facts
  ansible.builtin.set_fact:
    vllm_tar_filename: vllm-{{ vllm_vars.version }}.tar.gz

- name: Deploy vLLM
  when: vllm_vars.enabled
  block:
    - name: Create temp directory for chart download
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "{{ vllm_vars.inherited.mode }}"
      loop:
        - "{{ vllm_vars.inherited.downloads }}/{{ vllm_vars.version }}"
        - "{{ vllm_vars.inherited.install }}"

    - name: Download vLLM release tarball
      ansible.builtin.get_url:
        url: "{{ vllm_vars.helm.chart.url }}/v{{ vllm_vars.version }}/{{ vllm_tar_filename }}"
        dest: "{{ vllm_vars.inherited.downloads }}/{{ vllm_vars.version }}/{{ vllm_tar_filename }}"
        mode: "{{ vllm_vars.inherited.mode }}"

    - name: Extract Helm chart from tarball
      ansible.builtin.unarchive:
        src: "{{ vllm_vars.inherited.downloads }}/{{ vllm_vars.version }}/{{ vllm_tar_filename }}"
        dest: "{{ vllm_vars.inherited.install }}"
        remote_src: true

    - name: Install/Upgrade vLLM via Helm
      kubernetes.core.helm:
        name: "{{ vllm_vars.helm.name }}"
        namespace: "{{ vllm_vars.helm.namespace }}"
        chart_ref: "{{ vllm_vars.inherited.install }}/vllm-{{ vllm_vars.version }}/{{ vllm_vars.helm.chart.path }}"
        release_values: "{{ vllm_vars.helm_values }}"
        create_namespace: true
        kubeconfig: "{{ vllm_vars.inherited.kubeconfig }}"

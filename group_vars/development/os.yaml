os_host_vars:
  groups:
    - podman

  users:
    kerry:
      groups:
        - podman

development_os_packages:
  packages:
    - age
    - ansible
    - ansible-core
    - ansible-lint
    - bat
    - jq
    - python3-tk

    # Certbot Dependencies:
    - python3
    - python3-kubernetes
    - python3-pip
    - python3-yaml
    - python3-venv
    - libaugeas0

    # For local Python Gymnasium execution (graphics library)
    - swig

    - tree
    - unzip

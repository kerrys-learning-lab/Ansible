global:
  owner: root
  group: root
  mode: a=rX
  bin: /usr/local/bin
  working: /var/lib/ansible
  install: /usr/local/install
  source: /usr/local/src
  secrets: /usr/local/secrets
  kubeconfig: /etc/kubeconfig
  warning: "⚠️ WARNING"
  error: "❌ ERROR"

  claude:
    name: Claude
    email: claude@westsidestreet.net
    create: true
    shell: /bin/bash
    ssh_key:
      public: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHbb0/MTee+LwDMiyaPDF0a7/SnSOs3cRqj/PPw68ydX claude@westsidestreet.net
      private: "{{ lookup('ansible.builtin.vars', 'secrets_vault').claude.ed25519 }}"
    chezmoi:
      data:
        gitlab_token: "{{ lookup('ansible.builtin.vars', 'secrets_vault').claude.glpat }}"

  kerry:
    name: Kerry Johnson
    email: "{{ lookup('ansible.builtin.vars', 'secrets_vault').kerry.email }}"
    groups:
      - sudo
    chezmoi:
      age:
        recipient: "{{ lookup('ansible.builtin.vars', 'secrets_vault').kerry.age.recipient }}"
        secret: "{{ lookup('ansible.builtin.vars', 'secrets_vault').kerry.age.secret }}"
      data:
        gitlab_token: "{{ lookup('ansible.builtin.vars', 'secrets_vault').kerry.glpat }}"
        renovate_gh_token: "{{ lookup('ansible.builtin.vars', 'secrets_vault').renovate.github }}"
    ssh_key:
      public: ssh-rsa  kerry@westsidestreet.net
      private: "{{ lookup('ansible.builtin.vars', 'secrets_vault').kerry.rsa }}"
  gitlab_runner:
    name: GitLab Runner
    email: gitlab-runner@westsidestreet.net
    groups:
      - sudo
    create: true
    shell: /bin/bash
    chezmoi: {}
    ssh_key:
      public: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAII691qzE7BY2zrMfulfImat/HVsJEJ7SSUIP+fmLY0sF gitlab-runner@westsidestreet.net
      private: "{{ lookup('ansible.builtin.vars', 'secrets_vault').gitlab_runner.ed25519 }}"
  postgres:
    owner: 26
    group: 26

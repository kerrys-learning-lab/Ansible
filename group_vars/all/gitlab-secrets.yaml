gitlab_secrets:
  backups:
    minio:
      key: "{{ lookup('ansible.builtin.vars', '_secrets').gitlab.backups.minio.key }}"
  registry:
    postgresql:
      username: "{{ lookup('ansible.builtin.vars', '_secrets').gitlab.registry.postgresql.username }}"
      password: "{{ lookup('ansible.builtin.vars', '_secrets').gitlab.registry.postgresql.password }}"

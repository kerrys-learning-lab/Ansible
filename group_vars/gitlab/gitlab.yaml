gitlab:
  operator:
    name: gitlab-ci
    namespace: gitlab-system
    url: https://charts.gitlab.io
    ref: gitlab-operator
    version: 1.6.0
    helm_values: {}
  application:
    version: 8.5.1
    crd_values:
      global:
        hosts:
          domain: westsidestreet.net
        externalIp: 192.168.1.31
        ingress:
          configureCertmanager: false
      gitlab:
        gitaly:
          persistence:
            storageClass: local
            matchLabels:
              owner: gitlab-gitaly
            size: 100Gi
        webservice:
          ingress:
            tls:
              secretName: gitlab-ingress-tls
        registry:
          ingress:
            tls:
              secretName: gitlab-ingress-tls
        minio:
          ingress:
            tls:
              secretName: gitlab-ingress-tls
      postgresql:
        primary:
          persistence:
            existingClaim: postgresql
  directories:
    /mnt/ssd/k8s-local-pv:
      mode: u=rwx,go=rx
    /mnt/ssd/k8s-local-pv/gitlab:
      mode: u=rwx,go=rx
    /mnt/ssd/k8s-local-pv/gitlab/postgresql:
      owner: 1001
      group: 1001
      mode: u=rwx,go=rx
    /mnt/ssd/k8s-local-pv/gitlab/gitaly:
      owner: 1000
      group: 1000
      mode: u=rwx,go=rx
  k8s:
    certificates:
      gitlab-ingress:
        dnsNames:
          - gitlab.westsidestreet.net
          - registry.westsidestreet.net
          - minio.westsidestreet.net
    volumes:
      local:
        gitlab-postgresql:
          capacity: 100Gi
          path: /mnt/ssd/k8s-local-pv/gitlab/postgresql
        gitlab-gitaly:
          capacity: 100Gi
          path: /mnt/ssd/k8s-local-pv/gitlab/gitaly
    claims:
      local:
        postgresql:
          volume: gitlab-postgresql
          capacity: 100Gi

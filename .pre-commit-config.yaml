---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: [--unsafe]  # --unsafe required for Ansible vault tags (e.g. !vault)
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: git@gitlab.westsidestreet.net:kerrys-learning-lab/development-environment/pre-commit-hooks.git
    rev: v0.1.0
    hooks:
      - id: ansible-lint
        args:
          - westsidestreet.net.yaml

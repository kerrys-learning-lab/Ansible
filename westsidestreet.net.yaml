- name: Common Configuration for all Linux Hosts
  become: true
  hosts:
    - all
  roles:
    - common
    - os
    - role: resolve
      when: resolve is defined
      tags:
        - resolve
  tags:
    - base
    - common
    - os
  any_errors_fatal: true

- name: Configure for Development
  become: true
  hosts:
    - all
  pre_tasks:
    - name: Setup Ansible facts
      ansible.builtin.setup:
      tags:
        - always
  roles:
    - role: c++-development
      when: cpp_development is defined
      tags:
        - c++
    - role: argocd-cli
      when: argocd_cli is defined
      tags:
        - argocd
    - role: aws-development
      when: aws_development is defined
      tags:
        - aws
    - role: helm-cli
      when: helm_cli is defined
      tags:
        - helm
    - role: k9s
      when: k9s is defined
      tags:
        - k9s
    - role: open-gl
      when: open_gl is defined
      tags:
        - open-gl
        - opengl
    - role: podman
      when: podman is defined
      tags:
        - podman
  tags:
    - dev
  any_errors_fatal: true

# NOTE: rke2 must come before k8s
- name: RKE2
  become: true
  hosts:
    - rke2
  roles:
    - role: rke2
      when: rke2 is defined
      tags:
        - k8s
        - rke2


- name: Kubernetes
  become: true
  hosts:
    - k8s
  roles:
    - role: k8s
      when: k8s is defined
      tags:
        - k8s
    - role: metal-lb
      when: metal_lb is defined
      tags:
        - metal
        - metal-lb
    - role: elasticsearch-operator
      when: elasticsearch_operator is defined
      tags:
        - elasticsearch
    - role: sealed-secrets
      when: sealed_secrets is defined
      tags:
        - secrets
  tags:
    - k8s
  any_errors_fatal: true

- name: Remote Access to Other K8s Clusters
  become: true
  hosts:
    - all
  roles:
    - role: k8s-share
      when: k8s_share is defined
      tags:
        - k8s
        - share
  tags:
    - k8s
  any_errors_fatal: true

- name: Cluster Applications and Services
  become: true
  hosts:
    - all
  pre_tasks:
    - ansible.builtin.setup:
      tags:
        - always
  roles:
    - role: argocd-server
      when: argocd_server is defined
      tags:
        - argocd
    - role: dependabot-gitlab
      when: dependabot_gitlab is defined
      tags:
        - dependabot
        - dependabot-gitlab
        - gitlab
    - role: gitlab
      when: gitlab is defined
      tags:
        - gitlab
    - role: helm-applications
      when: helm_applications is defined or helm_applications_defaults is defined
      tags:
        - helm

- name: GPU Applications and Services
  become: true
  hosts:
    - all
  pre_tasks:
    - ansible.builtin.setup:
      tags:
        - always
  roles:
    - role: nvidia
      when: nvidia is defined
      tags:
        - gpu
        - nvidia

# code: language=ansible
- name: Bootstrap the Ansible Host
  become: true
  pre_tasks:
    - name: Setup Ansible facts
      ansible.builtin.setup:
      tags:
        - always
  hosts:
    - ansible
  roles:
    - role: ansible
  tags:
    - ansible

- name: Common Configuration for all Linux Hosts
  become: true
  pre_tasks:
    - name: Setup Ansible facts
      ansible.builtin.setup:
      tags:
        - always
  hosts:
    - all
  roles:
    - role: common
  tags:
    - common
  any_errors_fatal: true

- name: Proxmox VE Host Configuration
  become: true
  hosts:
    - proxmox
  pre_tasks:
    - name: Setup Ansible facts
      ansible.builtin.setup:
      tags:
        - always
  roles:
    - role: proxmox
  tags:
    - proxmox
  any_errors_fatal: true

- name: GPU Drivers and Services
  become: true
  hosts:
    - nvidia
  pre_tasks:
    - name: Setup Ansible facts
      ansible.builtin.setup:
      tags:
        - always
  roles:
    - role: nvidia
      tags:
        - gpu
        - nvidia

- name: Install/Configure Kubernetes and Kubernetes Applications
  become: true
  hosts: k8s
  pre_tasks:
    - name: Setup Ansible facts
      ansible.builtin.setup:
      tags:
        - always
  roles:
    - role: k8s-engine
      tags:
        - k8s-engine
    - role: k8s-tools
      tags:
        - k8s-tools
    - role: k8s-ecosystem
      tags:
        - k8s-ecosystem
    - role: k8s-applications
      tags:
        - k8s-applications
    - role: k8s-share
      tags:
        - share
    - role: argocd
      when: "'argocd' in group_names"
      tags:
        - argocd
    - role: gitlab
      when: "'gitlab' in group_names"
      tags:
        - gitlab
    - role: gitlab-runner
      when: "'gitlab_runner' in group_names"
      tags:
        - gitlab
        - gitlab-runner
    - role: small-step-ca
      when: "'ca' in group_names"
      tags:
        - ca
        - small-step-ca
  tags:
    - k8s
    - kubernetes

- name: Configure for Development
  become: true
  hosts:
    - development
  pre_tasks:
    - name: Setup Ansible facts
      ansible.builtin.setup:
      tags:
        - always
  roles:
    - role: dev-tools
  tags:
    - dev-tools
  any_errors_fatal: true

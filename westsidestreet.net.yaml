- name: Common Configuration for all Linux Hosts
  hosts:
    - all
  become: true
  roles:
    - common

- name: Configure Development Machine(s)
  hosts:
    - all
  become: true
  roles:
    - development
    - k8s
    - k8s-development

- name: Configure Clusters
  hosts:
    - clusters
  become: true
  roles:
    - k8s-ecosystem

- name: Configure ArgoCD
  hosts:
    - argocd
  become: true
  roles:
    - argocd

- name: Configure GitLab
  hosts:
    - gitlab
  become: true
  roles:
    - gitlab

- name: Configure GitLab Runner(s)
  hosts:
    - clusters
  become: true
  roles:
    - gitlab-runner

- name: Common Configuration for all Linux Hosts
  become: true
  hosts:
    - all
  roles:
    - role: common
    - role: synology-backup
      tags:
        - backup
        - synology
  tags:
    - base
    - common
    - os
    - packages
  any_errors_fatal: true

- name: Install/Configure k8s
  become: true
  hosts: k8s
  pre_tasks:
    - name: Setup Ansible facts
      ansible.builtin.setup:
      tags:
        - always
  roles:
    - role: crc # (CodeReady Containers)
      tags:
        - crc
      when: ansible_distribution == "Fedora"
    - role: rke2
      when: ansible_distribution == "Ubuntu"
      tags:
        - rke2
    - role: k8s
  tags:
    - k8s
    - kubernetes

- name: Configure for Development
  become: true
  hosts:
    - development
  pre_tasks:
    - name: Setup Ansible facts
      ansible.builtin.setup:
      tags:
        - always
  roles:
    - role: argocd-cli
      when: argocd_cli is defined
      tags:
        - argocd
    - role: aws-development
      when: aws_development is defined
      tags:
        - aws
    - role: helm-cli
      when: helm_cli is defined
      tags:
        - helm
    - role: c++-development
      when: cpp_development is defined
      tags:
        - c++
    - role: gitlabci-local
      tags:
        - gitlab
        - gitlabci
        - gitlab-ci
        - gitlabci-local
    - role: k9s
      when: k9s is defined
      tags:
        - k9s
    - role: open-gl
      when: open_gl is defined
      tags:
        - open-gl
        - opengl
    - role: podman
      when: podman is defined
      tags:
        - podman
  tags:
    - dev
    - development
  any_errors_fatal: true


- name: Kubernetes
  become: true
  hosts:
    - k8s
  roles:
    - role: k8s
      when: k8s is defined
      tags:
        - k8s
    - role: elasticsearch-operator
      when: elasticsearch_operator is defined
      tags:
        - elasticsearch
  tags:
    - k8s
  any_errors_fatal: true

- name: Remote Access to Other K8s Clusters
  become: true
  hosts:
    - all
  roles:
    - role: k8s-share
      when: k8s_share is defined
      tags:
        - k8s
        - share
  tags:
    - k8s
  any_errors_fatal: true

- name: Cluster Applications and Services
  become: true
  hosts:
    - all
  pre_tasks:
    - ansible.builtin.setup:
      tags:
        - always
  roles:
    - role: argocd-server
      when: argocd_server is defined
      tags:
        - argocd
    - role: dependabot-gitlab
      when: dependabot_gitlab is defined
      tags:
        - dependabot
        - dependabot-gitlab
        - gitlab
    - role: gitlab
      when: gitlab is defined
      tags:
        - gitlab
    - role: helm-applications
      when: helm_applications is defined or helm_applications_defaults is defined
      tags:
        - helm

- name: GPU Applications and Services
  become: true
  hosts:
    - all
  pre_tasks:
    - ansible.builtin.setup:
      tags:
        - always
  roles:
    - role: nvidia
      when: nvidia is defined
      tags:
        - gpu
        - nvidia

# code: language=ansible
#
# ============================================================================
# TEMPORARY: GitLab configuration for nvidia-5080
#
# This file exists to temporarily host GitLab on nvidia-5080 while elitedesk
# is rebuilt.  When elitedesk is ready to host GitLab again:
#
#   1. Remove this file
#   2. Remove nvidia-5080 from the 'gitlab' group in inventory/main.yaml
# ============================================================================

# ---------------------------------------------------------------------------
# GitLab Role Configuration
# ---------------------------------------------------------------------------
gitlab:
  operator:
    name: gitlab-ci
    namespace: gitlab-system
    url: https://charts.gitlab.io
    ref: gitlab-operator
    version: 2.8.2
    helm_values: {}
  application:
    name: gitlab-rehost
    version: 9.8.2
    crd_values:
      global:
        hosts:
          domain: "{{ lookup('ansible.builtin.vars', 'lan').domain }}"
          hostSuffix: rehost
        ingress:
          class: gitlab-nginx
          # Use the Cluster cert-manager (vice the built-in GitLab issuer)
          # See https://docs.gitlab.com/charts/charts/globals/#globalingressconfigurecertmanager
          configureCertmanager: false
        appConfig:
          backups:
            bucket: gitlab-backup
            tmpBucket: gitlab-tmp
        kas:
          enabled: true
        pages:
          enabled: true
      gitlab:
        gitaly:
          persistence:
            storageClass: local
            matchLabels:
              owner: gitlab-gitaly
            size: 100Gi
        toolbox:
          backups:
            objectStorage:
              config:
                secret: external-backup-s3cfg
            cron:
              enabled: true
              schedule: "@weekly"
        webservice:
          ingress:
            tls:
              secretName: gitlab-rehost-ingress-tls
      gitlab-pages:
        ingress:
          tls:
            secretName: gitlab-pages-tls
      minio:
        ingress:
          tls:
            secretName: gitlab-rehost-ingress-tls
      registry:
        enabled: true
        ingress:
          enabled: true
          tls:
            secretName: gitlab-rehost-ingress-tls
        database:
          configure: true
          enabled: true
          name: registry
          user: registry
          password:
            secret: gitlab-rehost-registry-database-password
            key: password
          migrations:
            enabled: true
      postgresql:
        install: true
        primary:
          persistence:
            existingClaim: postgresql
  k8s:
    claims:
      local:
        postgresql:
          volume: gitlab-18.x-postgresql-16.x
          capacity: 100Gi
  backups:
    minio:
      base: nas-minio.westsidestreet.net:9000
      bucket: nas-minio.westsidestreet.net:9000
      location: us-east-1
      https: false
      access: "{{ lookup('ansible.builtin.vars', 'secrets_vault').gitlab.backups.minio.access }}"


# ---------------------------------------------------------------------------
# K8s Role Configuration (merged via variable merge pattern, suffix '_k8s')
# ---------------------------------------------------------------------------
gitlab_k8s:
  namespaces:
    - gitlab-system

  certificates:
    gitlab-rehost-ingress:
      namespace: gitlab-system
      dnsNames:
        - gitlab-rehost.westsidestreet.net
        - registry-rehost.westsidestreet.net
        - minio-rehost.westsidestreet.net
        - kas-rehost.westsidestreet.net
    gitlab-pages:
      namespace: gitlab-system
      dnsNames:
        - pages-rehost.westsidestreet.net
        - "*.pages.westsidestreet.net"

  storage:
    local_volumes:
      gitlab-18.x-postgresql-16.x:
        capacity: 100Gi
        path: gitlab-18.x/postgresql-16.x
        owner: 1001
        group: 1001
        mode: u=rwx,go=rx
      gitlab-gitaly:
        capacity: 100Gi
        path: gitlab/gitaly
        owner: 1000
        group: 1000
        mode: u=rwx,go=rx

# code: language=ansible
gitlab01_gitlab:
  application:
    crd_values:
      global:
        common:
          certmanager.k8s.io/issuer: acme-letsencrypt-cluster-issuer
        hosts:
          domain: "{{ lookup('ansible.builtin.vars', 'lan').domain }}"
          pages:
            name: "{{ lookup('ansible.builtin.vars', 'lan').fqdn.pages }}"
        ingress:
          # Use the Cluster cert-manager (vice the built-in GitLab issuer)
          # See https://docs.gitlab.com/charts/charts/globals/#globalingressconfigurecertmanager
          configureCertmanager: false
          annotations:
            kubernetes.io/tls-acme: true
            cert-manager.io/cluster-issuer: acme-letsencrypt-cluster-issuer
            nginx.ingress.kubernetes.io/proxy-body-size: 1024m
            nginx.ingress.kubernetes.io/proxy-connect-timeout: 15
            nginx.ingress.kubernetes.io/proxy-read-timeout: 600
            nginx.ingress.kubernetes.io/service-upstream: true
          tls:
            secretName: gitlab-ingress-tls
        appConfig:
          backups:
            bucket: gitlab-backup
            tmpBucket: gitlab-tmp
        kas:
          enabled: true
        pages:
          enabled: true
      gitlab:
        gitaly:
          persistence:
            storageClass: local
            matchLabels:
              owner: gitlab-18.x--gitaly
            size: 100Gi
        sidekiq:
          # NOTE: Trying to reduce the number of open connections to PG due to
          #       constantly reaching max:
          minReplicas: 1
          maxReplicas: 1
          concurrency: 10
        toolbox:
          backups:
            objectStorage:
              config:
                secret: external-backup-s3cfg
            cron:
              enabled: true
              schedule: "@weekly"
        webservice:
          ingress:
            tls:
              secretName: gitlab-ingress-tls
      gitlab-pages:
        ingress:
          tls:
            secretName: gitlab-ingress-tls
      installCertmanager: false
      minio:
        ingress:
          tls:
            secretName: gitlab-ingress-tls
      postgresql:
        install: true
        primary:
          # NOTE: Increasing the max number of connections in PG due to
          #       constantly reaching max:
          extendedConfiguration: |
            max_connections = 500
            shared_buffers = 256MB                      # increase with max_connections
            idle_in_transaction_session_timeout = 60000 # kills stuck transactions
            statement_timeout = 30000                   # 30s; kills runaway queries
            tcp_keepalives_idle = 60
          persistence:
            existingClaim: postgresql
      registry:
        enabled: true
        ingress:
          enabled: true
          tls:
            secretName: gitlab-ingress-tls
        database:
          configure: true
          enabled: true
          name: registry
          user: registry
          password:
            secret: gitlab-registry-database-password
            key: password
          migrations:
            enabled: true
      webservice:
        puma:
          # NOTE: Trying to reduce the number of open connections to PG due to
          #       constantly reaching max:
          workers: 2
          minThreads: 1
          maxThreads: 4
  k8s:
    claims:
      local:
        postgresql:
          volume: gitlab-18.x--postgresql
          capacity: 100Gi
  backups:
    minio:
      base: nas-minio.westsidestreet.net:9000
      bucket: nas-minio.westsidestreet.net:9000
      location: us-east-1
      https: false
      access: "{{ lookup('ansible.builtin.vars', 'secrets_vault').gitlab.backups.minio.access }}"
  certificates:
    gitlab-ingress:
      namespace: gitlab-system
      dnsNames:
        - gitlab.westsidestreet.net
        - gitlab01.westsidestreet.net
        - registry.westsidestreet.net
        - minio.westsidestreet.net
        - kas.westsidestreet.net
        - pages.westsidestreet.net
        - "*.pages.westsidestreet.net"
  storage:
    local_volumes:
      gitlab-18.x--postgresql:
        capacity: 100Gi
        path: gitlab-18.x/postgresql
        owner: 1001
        group: 1001
        mode: u=rwx,go=rx
      gitlab-18.x--gitaly:
        capacity: 100Gi
        path: gitlab-18.x/gitaly
        owner: 1000
        group: 1000
        mode: u=rwx,go=rx
gitlab_secrets:
  backups:
    minio:
      key: "{{ lookup('ansible.builtin.vars', 'secrets_vault').gitlab.backups.minio.key }}"
  registry:
    postgresql:
      username: "{{ lookup('ansible.builtin.vars', 'secrets_vault').gitlab.registry.postgresql.username }}"
      password: "{{ lookup('ansible.builtin.vars', 'secrets_vault').gitlab.registry.postgresql.password }}"

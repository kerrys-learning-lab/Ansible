# code: language=ansible
argocd_server:
  helm:
    global:
      domain: argocd.{{ lookup('ansible.builtin.vars', 'lan').domain }}
    server:
      ingress:
        enabled: true
        tls: true
        ingressClassName: gitlab-nginx
        annotations:
          cert-manager.io/cluster-issuer: acme-letsencrypt-cluster-issuer
        extraTls:
          - secretName: argocd-server-tls
            hosts:
              - argocd.westsidestreet.net
      service:
        type: LoadBalancer
    configs:
      ssh:
        knownHosts: "{{ lookup('ansible.builtin.vars', 'secrets_vault').ssh.knownHosts }}"
      credentialTemplates:
        kerrys-learning-lab-git:
          url: git@gitlab.westsidestreet.net:kerrys-learning-lab
          sshPrivateKey: |
            {{ lookup('ansible.builtin.vars', 'secrets_vault').ssh.privateKey }}
        kerrys-learning-lab-helm:
          url: https://{{ lookup('ansible.builtin.vars', 'lan').fqdn.gitlab }}/api/v4
          username: argocd
          password: "{{ lookup('ansible.builtin.vars', 'secrets_vault').argocd.glpat }}"
      repositories:
        argo-cd:
          name: argo-cd
          url: https://gitlab.westsidestreet.net/api/v4/projects/29/packages/helm/stable
          type: helm
        boids-app:
          name: boids-app
          url: git@gitlab.westsidestreet.net:kerrys-learning-lab/boids/boids-app.git
        elasticsearch:
          name: elasticsearch
          url: https://gitlab.westsidestreet.net/api/v4/projects/34/packages/helm/stable
          type: helm
        helm-library:
          name: helm-library
          url: https://gitlab.westsidestreet.net/api/v4/projects/18/packages/helm/stable
          type: helm
        jupyter-server:
          name: jupyter-server
          url: https://gitlab.westsidestreet.net/api/v4/projects/7/packages/helm/stable
          type: helm
        mysql:
          name: mysql
          url: https://gitlab.westsidestreet.net/api/v4/projects/30/packages/helm/stable
          type: helm
        nats:
          name: nats
          url: https://nats-io.github.io/k8s/helm/charts/
          type: helm
        spyll:
          name: spyll
          type: helm
          url: https://gitlab.westsidestreet.net/api/v4/projects/32/packages/helm/stable
  projects:
    boids:
      description: |
        Boids is an artificial life program, developed by Craig Reynolds in
        1986, which simulates the flocking behaviour of birds, and related
        group motion.
      destination:
        name: "*"
  certificate:
    dnsNames:
      - argocd.westsidestreet.net
  applicationsets:
    boids:
      source:
        url: git@gitlab.westsidestreet.net:kerrys-learning-lab/boids/boids-app.git
        ref: 1-initial-development
        path: argocd-applications
      destination:
        name: dev-vm
